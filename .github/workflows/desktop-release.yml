name: SwaggerMan Release

# SwaggerMan-v* 태그 푸시 또는 수동 실행 시 macOS/Windows 설치본을 빌드해 GitHub Release에 첨부한다.
on:
  push:
    tags:
      - "SwaggerMan-v*"
  workflow_dispatch:

# 릴리스(태그/릴리스 생성)에 필요한 쓰기 권한
permissions:
  contents: write

defaults:
  run:
    working-directory: apps/desktop

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build app (tauri)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "SwaggerMan ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 자동 업데이트 서명(필수): 업데이터 아티팩트(.sig) + latest.json 생성
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 참고: Apple 코드서명/공증은 인증서가 없으면 env를 "설정하지 않아야" 한다.
          # 빈 값(APPLE_SIGNING_IDENTITY="")을 넘기면 Tauri가 실제 codesign을 시도하다 실패하므로,
          # 인증서를 보유하기 전까지는 ad-hoc 서명에 맡긴다(아래 변수는 의도적으로 미설정).
          # 인증서 발급 후 활성화:
          #   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
          #   APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
